{% extends "layout.html" %}
{% block title %}Axion | New Job{% endblock %}
{% block page_title %}New Job{% endblock %}

{% block content %}
<div class="ax-card">
  <div class="ax-card-h">Create Job</div>
  <div class="ax-card-b">
    <form method="post">
      <div class="row g-3 mb-3">
        <div class="col-12 col-lg-6">
          <label class="form-label">Internal Job Number</label>
          <div class="form-control" style="background:rgba(96,165,250,.08)!important; border-color:rgba(96,165,250,.3)!important; color:var(--accent)!important; font-weight:700; letter-spacing:.05em">
            {{ next_number }}
          </div>
          <div class="form-text" style="color:var(--muted)">Auto-generated on save &mdash; <a href="/admin/settings" style="color:var(--accent)">change sequence</a></div>
        </div>
        <div class="col-12 col-lg-6">
          <label class="form-label">Client Reference</label>
          <input class="form-control" name="client_reference" placeholder="e.g., 238139 (optional)">
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-12 col-lg-6">
          <label class="form-label">Client</label>
          <select class="form-select" name="client_id">
            <option value="">Select client</option>
            {% for c in clients %}
              <option value="{{c.id}}">{{ c.name }}</option>
            {% endfor %}
          </select>
          <div class="form-text"><a href="/clients/new" style="color:var(--accent)">Create client</a></div>
        </div>
        <div class="col-12 col-lg-6">
          <label class="form-label">Customer</label>
          <select class="form-select" name="customer_id">
            <option value="">Select customer</option>
            {% for c in customers %}
              <option value="{{c.id}}">{{ c.first_name }} {{ c.last_name }}{% if c.company %} ({{ c.company }}){% endif %}</option>
            {% endfor %}
          </select>
          <div class="form-text"><a href="/customers/new" style="color:var(--accent)">Create customer</a></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Assign To</label>
        <select class="form-select" name="assigned_user_id">
          <option value="">Unassigned</option>
          {% for u in users %}
            <option value="{{u.id}}">{{ u.full_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-12 col-lg-3">
          <label class="form-label">Job Type</label>
          <select class="form-select" name="job_type">
            {% for jt in job_types %}<option value="{{jt}}">{{jt}}</option>{% endfor %}
          </select>
        </div>
        <div class="col-12 col-lg-3">
          <label class="form-label">Visit Type</label>
          <select class="form-select" name="visit_type">
            {% for vt in visit_types %}<option value="{{vt}}">{{vt}}</option>{% endfor %}
          </select>
        </div>
        <div class="col-12 col-lg-3">
          <label class="form-label">Status</label>
          <select class="form-select" name="status">
            {% for st in statuses %}<option value="{{st}}">{{st}}</option>{% endfor %}
          </select>
        </div>
        <div class="col-12 col-lg-3">
          <label class="form-label">Priority</label>
          <select class="form-select" name="priority">
            {% for p in priorities %}<option value="{{p}}">{{p}}</option>{% endfor %}
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Job Address</label>
        <input class="form-control" name="job_address" placeholder="Street, Suburb, State, Postcode" data-maps-autocomplete>
      </div>

      <div class="mb-4">
        <label class="form-label">Description / Instructions</label>
        <textarea class="form-control" name="description" rows="4"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary">Create Job</button>
        <a class="btn btn-outline-secondary" href="/jobs">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
