{% extends "layout.html" %}
{% block content %}
<h3>New Job</h3>

<form method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Job Reference</label>
    <input class="form-control" name="job_ref" placeholder="e.g., 2602042-MCKENZIE-ARN (238139)" required>
  </div>

  <div class="row g-3">
    <div class="col-12 col-lg-4">
      <label class="form-label">Client</label>
      <select class="form-select" name="client_id">
        <option value="">Select client</option>
        {% for c in clients %}
          <option value="{{c.id}}">{{ c.name }}</option>
        {% endfor %}
      </select>
      <div class="form-text"><a href="/clients/new">Create client</a></div>
    </div>

    <div class="col-12 col-lg-4">
      <label class="form-label">Customer</label>
      <select class="form-select" name="customer_id">
        <option value="">Select customer</option>
        {% for c in customers %}
          <option value="{{c.id}}">{{ c.full_name }}</option>
        {% endfor %}
      </select>
      <div class="form-text"><a href="/customers/new">Create customer</a></div>
    </div>

    <div class="col-12 col-lg-4">
      <label class="form-label">Asset</label>
      <select class="form-select" name="asset_id">
        <option value="">Select asset</option>
        {% for a in assets %}
          <option value="{{a.id}}">{{ a.reg }}{% if a.make %} — {{a.make}} {{a.model}}{% endif %}</option>
        {% endfor %}
      </select>
      <div class="form-text"><a href="/assets/new">Create asset</a></div>
    </div>
  </div>

  <div class="row g-3 mt-1">
    <div class="col-12 col-lg-3">
      <label class="form-label">Job Type</label>
      <select class="form-select" name="job_type">
        {% for jt in job_types %}<option value="{{jt}}">{{jt}}</option>{% endfor %}
      </select>
    </div>
    <div class="col-12 col-lg-3">
      <label class="form-label">Visit Type</label>
      <select class="form-select" name="visit_type">
        {% for vt in visit_types %}<option value="{{vt}}">{{vt}}</option>{% endfor %}
      </select>
    </div>
    <div class="col-12 col-lg-3">
      <label class="form-label">Status</label>
      <select class="form-select" name="status">
        {% for st in statuses %}<option value="{{st}}">{{st}}</option>{% endfor %}
      </select>
    </div>
    <div class="col-12 col-lg-3">
      <label class="form-label">Priority</label>
      <select class="form-select" name="priority">
        {% for p in priorities %}<option value="{{p}}">{{p}}</option>{% endfor %}
      </select>
    </div>
  </div>

  <div class="mt-3">
    <label class="form-label">Job Address</label>
    <input class="form-control" name="job_address" placeholder="Street, Suburb, State, Postcode">
  </div>

  <div class="mt-3">
    <label class="form-label">Description / Instructions</label>
    <textarea class="form-control" name="description" rows="4"></textarea>
  </div>

  <div class="mt-4 d-flex gap-2">
    <button class="btn btn-primary">Create Job</button>
    <a class="btn btn-outline-secondary" href="/jobs">Cancel</a>
  </div>
</form>
{% endblock %}
