{% extends "layout.html" %}
{% block content %}
<h3>New Asset</h3>

<form method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Registration</label>
    <input class="form-control" name="reg" placeholder="e.g., ABC123">
  </div>
  <div class="mb-3">
    <label class="form-label">VIN</label>
    <input class="form-control" name="vin" placeholder="Vehicle Identification Number">
  </div>
  <div class="row g-3 mb-3">
    <div class="col-12 col-lg-4">
      <label class="form-label">Make</label>
      <input class="form-control" name="make" placeholder="e.g., Toyota">
    </div>
    <div class="col-12 col-lg-4">
      <label class="form-label">Model</label>
      <input class="form-control" name="model" placeholder="e.g., Camry">
    </div>
    <div class="col-12 col-lg-4">
      <label class="form-label">Year</label>
      <input class="form-control" name="year" type="number" placeholder="e.g., 2020">
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea class="form-control" name="notes" rows="3"></textarea>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary">Create Asset</button>
    <a class="btn btn-outline-secondary" href="/assets">Cancel</a>
  </div>
</form>
{% endblock %}
