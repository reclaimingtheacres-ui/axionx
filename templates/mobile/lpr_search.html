{% extends "mobile/base.html" %}
{% block title %}Plate Lookup — AxionX{% endblock %}

{% block header_title %}Plate Lookup{% endblock %}

{% block content %}
<div class="m-card">
  <div class="m-card-header">Search Active Assets</div>
  <div class="m-card-body">
    <form method="POST" action="{{ url_for('m_lpr') }}" autocomplete="off">
      <div style="margin-bottom:16px;">
        <label for="registration" class="m-label">Registration Number</label>
        <input
          type="text"
          id="registration"
          name="registration"
          required
          autofocus
          autocapitalize="characters"
          autocorrect="off"
          spellcheck="false"
          placeholder="e.g. ABC123"
          style="display:block;width:100%;box-sizing:border-box;
                 font-size:1.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
                 text-align:center;padding:14px 12px;
                 border:2px solid var(--line);border-radius:10px;
                 background:#f9fafb;color:var(--text);outline:none;
                 -webkit-appearance:none;"
          oninput="this.value = this.value.toUpperCase()"
        >
      </div>
      <button type="submit" class="m-btn m-btn-primary">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search Active Assets
      </button>
    </form>
  </div>
</div>

<a href="{{ url_for('m_lpr_capture') }}"
   style="display:flex;align-items:center;justify-content:space-between;gap:12px;
          background:#f9fafb;border:1.5px solid var(--line);border-radius:12px;
          padding:14px 16px;margin-bottom:14px;text-decoration:none;">
  <div style="display:flex;align-items:center;gap:12px;">
    <svg viewBox="0 0 24 24" width="22" height="22" stroke="var(--accent)" fill="none" stroke-width="1.5" style="flex-shrink:0;"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    <div>
      <div style="font-size:.88rem;font-weight:600;color:var(--text);">Camera / Photo Upload</div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:2px;">Take a photo or upload from library</div>
    </div>
  </div>
  <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--muted)" fill="none" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
</a>
{% endblock %}
