{% extends "layout.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-6 col-lg-3"><div class="card p-3"><div class="h6">Jobs</div><div class="h3">{{ jobs_count }}</div></div></div>
  <div class="col-6 col-lg-3"><div class="card p-3"><div class="h6">Clients</div><div class="h3">{{ clients_count }}</div></div></div>
  <div class="col-6 col-lg-3"><div class="card p-3"><div class="h6">Customers</div><div class="h3">{{ customers_count }}</div></div></div>
  <div class="col-6 col-lg-3"><div class="card p-3"><div class="h6">Assets</div><div class="h3">{{ assets_count }}</div></div></div>
</div>

<div class="mt-4 d-flex gap-2">
  <a class="btn btn-primary" href="/jobs/new">New Job</a>
  <a class="btn btn-outline-secondary" href="/clients/new">New Client</a>
  <a class="btn btn-outline-secondary" href="/customers/new">New Customer</a>
  <a class="btn btn-outline-secondary" href="/assets/new">New Asset</a>
</div>
{% endblock %}
