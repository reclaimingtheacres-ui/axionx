{% extends "layout.html" %}
{% block title %}Axion | Home{% endblock %}
{% block page_title %}Home{% endblock %}

{% block content %}
<div class="row g-3 mb-4">
  <div class="col-6 col-lg-4">
    <a href="/jobs" class="text-decoration-none">
      <div class="ax-card p-3 text-center">
        <div class="small mb-1" style="color:var(--muted)">Jobs</div>
        <div class="display-6 fw-bold" style="color:var(--accent)">{{ jobs_count }}</div>
      </div>
    </a>
  </div>
  <div class="col-6 col-lg-4">
    <a href="/clients" class="text-decoration-none">
      <div class="ax-card p-3 text-center">
        <div class="small mb-1" style="color:var(--muted)">Clients</div>
        <div class="display-6 fw-bold" style="color:var(--text)">{{ clients_count }}</div>
      </div>
    </a>
  </div>
  <div class="col-6 col-lg-4">
    <a href="/customers" class="text-decoration-none">
      <div class="ax-card p-3 text-center">
        <div class="small mb-1" style="color:var(--muted)">Customers</div>
        <div class="display-6 fw-bold" style="color:var(--text)">{{ customers_count }}</div>
      </div>
    </a>
  </div>
</div>

<div class="d-flex gap-2 flex-wrap">
  <a class="btn btn-primary" href="/jobs/new">New Job</a>
  <a class="btn btn-outline-secondary" href="/clients/new">New Client</a>
  <a class="btn btn-outline-secondary" href="/customers/new">New Customer</a>
</div>
{% endblock %}
