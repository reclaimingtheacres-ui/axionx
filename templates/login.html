{% extends "layout.html" %}
{% block title %}Axion | Login{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="ax-card">
      <div class="ax-card-b text-center">
        <img src="{{ url_for('static', filename='images/axion-logo.png') }}" height="64" class="mb-3" alt="Axion">
        <div class="mb-3" style="color:var(--muted)">Sign in to continue</div>

        <form method="post" action="/login">
          <div class="mb-2 text-start">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" placeholder="you@example.com" autofocus required>
          </div>
          <div class="mb-3 text-start">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password" placeholder="Password" required>
          </div>
          <button class="btn btn-primary w-100">Login</button>
        </form>

        {% if allow_signup %}
          <div class="mt-3 small">
            <a href="/signup" style="color:var(--accent)">No account yet? Create admin account</a>
          </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
