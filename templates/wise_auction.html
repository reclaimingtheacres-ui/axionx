{% extends "layout.html" %}
{% block title %}Wise Auction Instructions — {{ rec.registration or rec.description or ('Case ' ~ (rec.wise_case_number or rec.swpi_ref or rec.id)) }}{% endblock %}
{% block content %}
<div style="max-width:700px;margin:20px auto;padding:0 12px;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    <a href="/jobs/{{ job_id }}" style="color:#6b7280;text-decoration:none;font-size:.9rem;">&larr; Back to Job</a>
    <div style="flex:1;text-align:center;">
      <h2 style="margin:4px 0 0;font-size:1.1rem;font-weight:700;color:#111;">Wise Auction Instructions</h2>
    </div>
    <span style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:6px;padding:4px 10px;font-size:.78rem;font-weight:700;">Wise Group</span>
  </div>

  <form method="POST" action="/jobs/{{ job_id }}/repo-lock/{{ rec.id }}/wise-auction">
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:12px;">
      <h6 style="font-weight:700;font-size:.85rem;margin-bottom:10px;color:#111;">Auction Details</h6>

      <div style="margin-bottom:8px;">
        <label style="font-size:.78rem;font-weight:600;color:#374151;">Principal / On Behalf Of</label>
        <input class="form-control form-control-sm" name="finance_company" value="{{ d.finance_company or d.client_name or '' }}">
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:.78rem;font-weight:600;color:#374151;">Reference Number</label>
        <input class="form-control form-control-sm" name="wise_case_number" value="{{ d.wise_case_number or d.swpi_ref or d.client_reference or '' }}">
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:.78rem;font-weight:600;color:#374151;">Unit Details</label>
        <input class="form-control form-control-sm" name="unit_details" value="{{ [d.year, d.make, d.model]|select|join(' ') }}">
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:.78rem;font-weight:600;color:#374151;">Rego Number</label>
        <input class="form-control form-control-sm" name="registration" value="{{ d.registration or '' }}">
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:.78rem;font-weight:600;color:#374151;">Engine Number</label>
        <input class="form-control form-control-sm" name="engine_number" value="{{ d.engine_number or '' }}">
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:.78rem;font-weight:600;color:#374151;">VIN</label>
        <input class="form-control form-control-sm" name="vin" value="{{ d.vin or '' }}">
      </div>
    </div>

    <button type="submit" class="btn btn-warning w-100" style="font-weight:600;border-radius:10px;padding:12px;">
      Generate Wise Auction PDF
    </button>
  </form>
</div>
{% endblock %}
