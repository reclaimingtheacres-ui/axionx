{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="m-0">Users</h3>
  <a class="btn btn-primary" href="/users/new">New User</a>
</div>

<div class="list-group">
  {% for u in users %}
    <div class="list-group-item">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div class="fw-semibold">{{ u.full_name }}</div>
          <div class="small text-muted">{{ u.email }}</div>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <span class="badge {% if u.role == 'admin' %}bg-danger{% else %}bg-secondary{% endif %}">{{ u.role }}</span>
          {% if not u.active %}<span class="badge bg-warning text-dark">Inactive</span>{% endif %}
        </div>
      </div>
    </div>
  {% else %}
    <div class="text-muted">No users yet.</div>
  {% endfor %}
</div>
{% endblock %}
