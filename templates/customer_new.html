{% extends "layout.html" %}
{% block title %}Axion | New Customer{% endblock %}
{% block page_title %}New Customer{% endblock %}

{% block content %}
<form method="post" enctype="multipart/form-data" id="custNewForm">
  <input type="hidden" name="next_url" value="{{ next_url }}">
  <input type="hidden" name="return_job" value="{{ return_job }}">

  <div class="ax-card mb-3">
    <div class="ax-card-h d-flex justify-content-between align-items-center">
      <div>Shared Details</div>
    </div>
    <div class="ax-card-b">
      <div class="row g-2">
        <div class="col-12 col-md-6">
          <label class="form-label">Company <span class="small" style="color:var(--muted)">(optional — applies to all people below)</span></label>
          <input class="form-control" name="shared_company" id="sharedCompany" placeholder="e.g. Acme Pty Ltd">
        </div>
      </div>
    </div>
  </div>

  <div id="personList"></div>

  <div class="mb-3">
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addPerson()">+ Add Another Person</button>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Create Customer(s)</button>
    <a class="btn btn-outline-secondary" href="{% if return_job %}/jobs/{{ return_job }}{% elif next_url %}{{ next_url }}{% else %}/customers{% endif %}">Cancel</a>
  </div>
</form>

<template id="personTemplate">
  <div class="ax-card mb-3 person-block">
    <div class="ax-card-h d-flex justify-content-between align-items-center">
      <div class="person-title">Person 1</div>
      <button type="button" class="btn btn-outline-danger btn-sm remove-person-btn" onclick="removePerson(this)" style="display:none">Remove</button>
    </div>
    <div class="ax-card-b">
      <div class="row g-2">
        <div class="col-12 col-md-4">
          <label class="form-label">First name *</label>
          <input class="form-control" name="first_name[]" required>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Last name *</label>
          <input class="form-control" name="last_name[]" required>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Role</label>
          <select class="form-select" name="role[]">
            <option value="">— None —</option>
            <option value="Primary">Primary</option>
            <option value="Director">Director</option>
            <option value="Guarantor">Guarantor</option>
            <option value="Borrower">Borrower</option>
            <option value="Spouse">Spouse</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Email Addresses</label>
        <div class="row g-2">
          <div class="col-12 col-md-4">
            <input class="form-control" name="email_personal[]" type="email" placeholder="Personal">
          </div>
          <div class="col-12 col-md-4">
            <input class="form-control" name="email_work[]" type="email" placeholder="Work">
          </div>
          <div class="col-12 col-md-4">
            <input class="form-control" name="email_other[]" type="email" placeholder="Other">
          </div>
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Phone Numbers</label>
        <div class="row g-2">
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_mobile[]" placeholder="Mobile">
          </div>
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_home[]" placeholder="Home">
          </div>
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_work[]" placeholder="Work">
          </div>
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_other[]" placeholder="Other">
          </div>
        </div>
      </div>

      <div class="row g-2 mt-3">
        <div class="col-12 col-md-4">
          <label class="form-label">Date of Birth</label>
          <input class="form-control" name="dob[]" type="date">
        </div>
      </div>
      <div class="row g-2 mt-3">
        <div class="col-12 col-lg-6">
          <label class="form-label">Address</label>
          <input class="form-control ax-address" name="address[]" placeholder="Street, Suburb, State, Postcode" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div class="mt-3">
        <label class="form-label">Internal Notes</label>
        <textarea class="form-control" name="notes[]" rows="3"></textarea>
      </div>
      <div class="mt-3">
        <label class="form-label">Customer ID Image <span class="small" style="color:var(--muted)">(PNG, JPG, PDF)</span></label>
        <input class="form-control" type="file" name="id_photo[]" accept=".png,.jpg,.jpeg,.webp,.pdf">
      </div>
    </div>
  </div>
</template>

<script>
  var personCount = 0;

  function addPerson() {
    personCount++;
    var tmpl = document.getElementById('personTemplate').content.cloneNode(true);
    var block = tmpl.querySelector('.person-block');
    block.querySelector('.person-title').textContent = 'Person ' + personCount;
    if (personCount > 1) {
      block.querySelector('.remove-person-btn').style.display = '';
    }
    if (personCount === 1) {
      var roleSelect = block.querySelector('select[name="role[]"]');
      for (var i = 0; i < roleSelect.options.length; i++) {
        if (roleSelect.options[i].value === 'Primary') {
          roleSelect.options[i].selected = true;
          break;
        }
      }
    }
    document.getElementById('personList').appendChild(tmpl);
    updateTitles();
  }

  function removePerson(btn) {
    var block = btn.closest('.person-block');
    block.remove();
    updateTitles();
  }

  function updateTitles() {
    var blocks = document.querySelectorAll('.person-block');
    blocks.forEach(function(block, i) {
      block.querySelector('.person-title').textContent = 'Person ' + (i + 1);
      var removeBtn = block.querySelector('.remove-person-btn');
      removeBtn.style.display = blocks.length > 1 ? '' : 'none';
    });
  }

  addPerson();
</script>
{% endblock %}
