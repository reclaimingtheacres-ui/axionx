{% extends "layout.html" %}
{% block title %}Axion | Edit Client{% endblock %}
{% block page_title %}Edit Client{% endblock %}

{% block content %}
<div class="ax-card">
  <div class="ax-card-h">Client Details</div>
  <div class="ax-card-b">
    <form method="post">
      <div class="row g-2">
        <div class="col-12 col-lg-8">
          <label class="form-label">Client Name</label>
          <input class="form-control" name="name" value="{{ client.name }}" required>
        </div>
        <div class="col-12 col-lg-4">
          <label class="form-label">Email</label>
          <input class="form-control" name="email" value="{{ client.email or '' }}">
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Phone Numbers</label>
        {% set pm = {} %}
        {% for p in phones %}{% set _ = pm.update({p['label']: p['phone_number']}) %}{% endfor %}
        <div class="row g-2">
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_mobile" placeholder="Mobile" value="{{ pm.get('Mobile','') }}">
          </div>
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_home" placeholder="Home" value="{{ pm.get('Home','') }}">
          </div>
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_work" placeholder="Work" value="{{ pm.get('Work','') }}">
          </div>
          <div class="col-6 col-lg-3">
            <input class="form-control" name="phone_other" placeholder="Other" value="{{ pm.get('Other','') }}">
          </div>
        </div>
      </div>

      <div class="row g-2 mt-1">
        <div class="col-12">
          <label class="form-label">Address</label>
          <input class="form-control" name="address" value="{{ client.address or '' }}" data-maps-autocomplete>
        </div>
      </div>

      <div class="mt-2">
        <label class="form-label">Notes</label>
        <textarea class="form-control" name="notes" rows="4">{{ client.notes or '' }}</textarea>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary">Save Changes</button>
        <a class="btn btn-outline-secondary" href="/clients/{{ client.id }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
