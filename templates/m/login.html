<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>AxionX — Sign In</title>
<style>
:root { --bg:#0d1117; --card:#161b22; --accent:#60a5fa; --line:#30363d; --text:#e6edf3; --muted:#8b949e; --red:#f87171; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0); }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { font-size: 1.7rem; font-weight: 800; letter-spacing: .04em; color: var(--accent); margin-bottom: 6px; }
.logo-sub { font-size: .78rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 36px; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; }
label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
input { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; color: var(--text); font-size: 1rem; padding: 13px 14px; outline: none; transition: border-color .15s; -webkit-appearance: none; }
input:focus { border-color: var(--accent); }
.fg { margin-bottom: 16px; }
button { width: 100%; background: var(--accent); color: #0d1117; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; padding: 14px; cursor: pointer; margin-top: 6px; -webkit-appearance: none; }
button:active { opacity: .8; }
.err { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.3); border-radius: 9px; padding: 10px 14px; font-size: .88rem; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="logo">AxionX</div>
<div class="logo-sub">Field Operations</div>
<div class="card">
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}<div class="err">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="post" action="{{ url_for('m_login') }}">
    <div class="fg">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" inputmode="email" required value="{{ prefill_email or '' }}">
    </div>
    <div class="fg">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
