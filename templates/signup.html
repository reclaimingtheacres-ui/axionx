{% extends "layout.html" %}
{% block title %}Axionx | Setup{% endblock %}
{% block page_title %}Create Admin Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="ax-card">
      <div class="ax-card-b">
        <div class="text-center mb-4">
          <img src="{{ url_for('static', filename='images/axionx-icon.png') }}" height="64" class="mb-2" alt="Axionx">
          <div style="color:var(--muted)">First-time setup — create your admin account</div>
        </div>

        <form method="post" action="/signup">
          <div class="mb-2">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="full_name" placeholder="Your full name" required autofocus>
          </div>
          <div class="mb-2">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password" placeholder="Choose a strong password" required>
          </div>
          <button class="btn btn-primary w-100">Create Admin Account</button>
        </form>

        <div class="text-center mt-3 small">
          <a href="/login" style="color:var(--muted)">Back to login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
