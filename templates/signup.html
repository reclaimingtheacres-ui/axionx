<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Axion — Create Admin Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh">
  <div class="card p-4" style="width:100%;max-width:400px">
    <div class="text-center mb-3">
      <img src="/static/images/axion-logo.png" height="64">
    </div>
    <p class="text-muted text-center small mb-4">Create your admin account to get started.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{category}} py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="/signup">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input class="form-control" name="full_name" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" name="email" type="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" name="password" type="password" required>
      </div>
      <button class="btn btn-primary w-100">Create Admin Account</button>
    </form>
    <div class="text-center mt-3">
      <a class="small" href="/login">Back to login</a>
    </div>
  </div>
</div>
</body>
</html>
