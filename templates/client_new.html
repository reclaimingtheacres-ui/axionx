{% extends "layout.html" %}
{% block title %}Axion | New Client{% endblock %}
{% block page_title %}New Client{% endblock %}

{% block content %}
<div class="ax-card">
  <div class="ax-card-h">Client Details</div>
  <div class="ax-card-b">
    <form method="post">
      <input type="hidden" name="next_url" value="{{ next_url }}">
      <div class="mb-3">
        <label class="form-label">Client Name *</label>
        <input class="form-control" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input class="form-control" name="phone" type="tel">
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" name="email" type="email">
      </div>
      <div class="mb-3">
        <label class="form-label">Address</label>
        <input class="form-control" name="address" data-maps-autocomplete autocomplete="off" spellcheck="false">
      </div>
      <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea class="form-control" name="notes" rows="3"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary">Create Client</button>
        <a class="btn btn-outline-secondary" href="{{ next_url or '/clients' }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
