<h5 class="mb-3" style="color:var(--text)">New Client</h5>
<form action="/clients/new-popup" method="post">
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Client Name <span style="color:#ef4444">*</span></label>
    <input class="form-control" name="name" placeholder="e.g. Macquarie Leasing" required autofocus>
  </div>
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Phone (optional)</label>
    <input class="form-control" name="phone" placeholder="e.g. 03 9123 4567">
  </div>
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Email (optional)</label>
    <input class="form-control" name="email" type="email" placeholder="e.g. ops@client.com.au">
  </div>
  <div id="popup-error" class="text-danger small mb-2 d-none"></div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Create Client</button>
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
  </div>
</form>
