<h5 class="mb-3" style="color:var(--text)">New Agent</h5>
<form action="/users/new-popup" method="post">
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Full Name <span style="color:#ef4444">*</span></label>
    <input class="form-control" name="full_name" placeholder="e.g. Jane Smith" required autofocus>
  </div>
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Email <span style="color:#ef4444">*</span></label>
    <input class="form-control" name="email" type="email" placeholder="e.g. jane@company.com.au" required>
  </div>
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Password <span style="color:#ef4444">*</span></label>
    <input class="form-control" name="password" type="password" placeholder="Min. 6 characters" required minlength="6">
    <div class="form-text" style="color:var(--muted);font-size:.78rem">Agent will use this to sign in.</div>
  </div>
  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Role</label>
    <select class="form-select" name="role">
      <option value="agent" selected>Agent</option>
      <option value="admin">Admin</option>
    </select>
  </div>
  <div id="popup-error" class="text-danger small mb-2 d-none"></div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Create Agent</button>
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
  </div>
</form>
