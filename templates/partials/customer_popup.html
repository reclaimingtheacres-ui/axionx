<h5 class="mb-3" style="color:var(--text)">New Customer</h5>
<form action="/customers/new-popup" method="post">
  <div class="row g-2 mb-3">
    <div class="col-6">
      <label class="form-label" style="color:var(--muted);font-size:.85rem">First Name <span style="color:#ef4444">*</span></label>
      <input class="form-control" name="first_name" placeholder="First" required autofocus>
    </div>
    <div class="col-6">
      <label class="form-label" style="color:var(--muted);font-size:.85rem">Last Name <span style="color:#ef4444">*</span></label>
      <input class="form-control" name="last_name" placeholder="Last" required>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Company (optional)</label>
    <input class="form-control" name="company" placeholder="e.g. Smith Pty Ltd">
  </div>

  <div class="mb-3">
    <label class="form-label d-block" style="color:var(--muted);font-size:.85rem">Phone Numbers</label>
    <div id="phoneRows">
      <div class="d-flex gap-2 align-items-center mb-2 phone-row">
        <input class="form-control" name="phone_label[]" placeholder="Mobile"
               style="max-width:88px;font-size:.85rem">
        <input class="form-control" name="phone_number[]" placeholder="e.g. 0412 345 678"
               style="font-size:.85rem">
        <button type="button" class="btn btn-sm btn-outline-danger px-2 flex-shrink-0"
                onclick="removePhoneRow(this)" title="Remove">&times;</button>
      </div>
    </div>
    <button type="button" class="btn btn-sm btn-outline-secondary mt-1"
            onclick="addPhoneRow()">+ Add Phone</button>
  </div>

  <div class="mb-3">
    <label class="form-label d-block" style="color:var(--muted);font-size:.85rem">Email Addresses</label>
    <div id="emailRows">
      <div class="d-flex gap-2 align-items-center mb-2 email-row">
        <input class="form-control" name="email_label[]" placeholder="Personal"
               style="max-width:88px;font-size:.85rem">
        <input class="form-control" name="email_address[]" type="email"
               placeholder="e.g. john@example.com" style="font-size:.85rem">
        <button type="button" class="btn btn-sm btn-outline-danger px-2 flex-shrink-0"
                onclick="removeEmailRow(this)" title="Remove">&times;</button>
      </div>
    </div>
    <button type="button" class="btn btn-sm btn-outline-secondary mt-1"
            onclick="addEmailRow()">+ Add Email</button>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color:var(--muted);font-size:.85rem">Address (optional)</label>
    <input class="form-control" name="address" data-maps-autocomplete placeholder="Street, Suburb, State, Postcode" autocomplete="off" spellcheck="false">
  </div>

  <div id="popup-error" class="text-danger small mb-2 d-none"></div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Create Customer</button>
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
  </div>
</form>
